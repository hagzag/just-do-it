{{- if .Values.inflate }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karpenter-addon.fullname" . }}
  labels:
    {{- include "karpenter-addon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "karpenter-addon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "karpenter-addon.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "karpenter-addon.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
      terminationGracePeriodSeconds: 0
      securityContext:
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}

# kubectl scale deployment inflate --replicas 5
# kubectl logs -f -n "${KARPENTER_NAMESPACE}" -l app.kubernetes.io/name=karpenter -c controller
